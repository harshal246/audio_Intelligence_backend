name: Build and Deploy to EC2

on:
  push:
    branches:
      - main  # Triggers only when you push to main branch

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build Docker image and push to DockerHub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/audio-intelligence:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/audio-intelligence:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to EC2 (runs after build succeeds)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs if build succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "~/app"

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app

            # Write the .env file from GitHub Secrets
            cat > .env <<'EOF'
            DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@db:5432/audio_intelligence
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL=gemini-2.0-flash-lite
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            MODEL_SIZE=tiny
            UPLOAD_DIR=uploads
            CHUNK_DIR=chunks
            USE_S3=${{ secrets.USE_S3 }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            ACCESS_TOKEN_EXPIRE_MINUTES=30
            REFRESH_TOKEN_EXPIRE_DAYS=7
            RESET_TOKEN_EXPIRE_MINUTES=15
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # Pull the latest image and restart containers using prod profile
            docker compose --profile prod pull
            docker compose --profile prod up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f
