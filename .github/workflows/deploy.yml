name: Build and Deploy to EC2

on:
  push:
    branches:
      - main  # Triggers only when you push to main branch

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build Docker image and push to DockerHub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/audio-intelligence:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/audio-intelligence:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to EC2 (runs after build succeeds)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs if build succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "~/app"

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app

            # Write the .env file from a single GitHub Secret
            echo "${{ secrets.ENV_FILE }}" > .env

            # Override DATABASE_URL and REDIS_URL for Docker networking
            echo "DATABASE_URL=postgresql://postgres:$(grep POSTGRES_PASSWORD .env | cut -d '=' -f2)@db:5432/audio_intelligence" >> .env
            echo "REDIS_URL=redis://redis:6379/0" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            # Pull the latest image and restart containers using prod profile
            docker compose --profile prod pull
            docker compose --profile prod up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f
